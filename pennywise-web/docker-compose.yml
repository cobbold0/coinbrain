services:
  db:
    image: postgres:16
    container_name: pennywise-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pennywise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pennywise"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pennywise-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/pennywise
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
